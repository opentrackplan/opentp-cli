opentp: 2026-01

info:
  title: TaskFlow Tracking Plan
  version: 1.0.0
  description: >
    Analytics tracking plan for TaskFlow — a collaborative project management SaaS.
    Events are sent to Snowplow via the opentp-sdk Snowplow adapter.
  contact:
    - Analytics Team <analytics@taskflow.io>
    - Data Engineering <data-eng@taskflow.io>

spec:
  paths:
    events:
      root: /events
      template: "{area}/{event}.yaml"
    dictionaries:
      root: /dictionaries

  targets:
    web:
      title: Web Analytics
    ios:
      title: iOS App
    android:
      title: Android App

  export:
    generators:
      - name: ts-sdk
        target: web
        standalone: true
      - name: swift-sdk
        target: ios
      - name: kotlin-sdk
        target: android
    bundle: true

  ui:
    theme: auto
    mode: editor
    title: "TaskFlow Tracking Plan"

  events:
    key:
      pattern: "^[a-z0-9_]+::[a-z0-9_]+$"

    x-opentp:
      keygen:
        template: "{area | slug}::{event | slug}"
        transforms:
          slug:
            - lower
            - trim
            - replace: { from: " ", to: "_" }
            - truncate: 160

    taxonomy:
      area:
        title: Product Area
        type: string
        dict: taxonomy/areas
        required: true
      event:
        title: Event Name
        type: string
        required: true
      action:
        title: Action Description
        type: string
        description: Human-readable description of what triggered this event
        maxLength: 150
        required: true
      priority_level:
        title: Priority Level
        type: number
        enum: [1, 2, 3]
        description: "1 = business-critical (revenue/auth), 2 = important (core features), 3 = nice-to-have"
        required: false

    payload:
      targets:
        all: [web]
        ios: [ios]
        android: [android]
      schema:
        app_id:
          title: Application ID
          type: string
          required: true
          valueRequired: true
          description: Identifies the application emitting the event
          x-opentp:
            role: constant
        app_version:
          title: Application Version
          type: string
          required: true
          pattern: "^\\d+\\.\\d+\\.\\d+$"
          description: Semantic version of the deployed application (e.g. 2.4.1)
          x-opentp:
            role: shared
        event_name:
          title: Event Name
          type: string
          required: true
          valueRequired: true
          description: Machine-readable event name sent to the analytics platform
          x-opentp:
            role: constant
        user_id:
          title: User ID
          type: string
          required: false
          description: Authenticated user's stable unique identifier
          pii:
            kind: user_id
            masker: hash
            owner: analytics
            jira: DATA-001
            retention_days: 365
        workspace_id:
          title: Workspace ID
          type: string
          required: false
          description: Workspace (organisation) the user belongs to
        session_id:
          title: Session ID
          type: string
          required: false
          description: Analytics session identifier, rotated on timeout or browser close

    pii:
      kind:
        required: true
        dict: governance/pii-kinds
      masker:
        required: false
      schema:
        owner:
          type: string
          dict: governance/pii-owners
          required: true
        jira:
          type: string
          required: true
          pattern: "^[A-Z]+-[0-9]+$"
        retention_days:
          type: number
          enum: [0, 30, 90, 365]
          required: false
