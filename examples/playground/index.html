<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenTP Platform Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; }

    /* Top control bar */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .controls h1 {
      font-size: 14px;
      font-weight: 600;
      margin-right: 16px;
      white-space: nowrap;
    }
    .controls label {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }
    .controls select, .controls button {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #2a2a4a;
      color: #fff;
      cursor: pointer;
    }
    .controls button { background: #4a4aff; border-color: #6666ff; }
    .controls button:hover { background: #5a5aff; }
    .controls .sep { width: 1px; height: 24px; background: #444; }

    /* Component container */
    .container {
      width: 100%;
      height: calc(100vh - 52px);
    }
    .container > * {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Info overlay */
    .info {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.8);
      color: #ccc;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 11px;
      max-width: 350px;
      line-height: 1.5;
      z-index: 101;
    }
    .info strong { color: #fff; }
  </style>
</head>
<body>

  <div class="controls">
    <h1>Platform Playground</h1>

    <label>Mode:</label>
    <select id="mode-select">
      <option value="a">A — Plain Viewer</option>
      <option value="b">B — Single App + Role</option>
      <option value="c" selected>C — Multi-App Platform</option>
    </select>

    <div class="sep"></div>

    <label>Role:</label>
    <select id="role-select">
      <option value="viewer">Viewer</option>
      <option value="editor" selected>Editor</option>
      <option value="admin">Admin</option>
    </select>

    <div class="sep"></div>

    <label>Accent:</label>
    <select id="accent-select">
      <option value="blue" selected>Blue</option>
      <option value="indigo">Indigo</option>
      <option value="violet">Violet</option>
      <option value="emerald">Emerald</option>
      <option value="rose">Rose</option>
      <option value="amber">Amber</option>
      <option value="cyan">Cyan</option>
    </select>

    <div class="sep"></div>

    <label>Default mode:</label>
    <select id="defaultmode-select">
      <option value="viewer">Viewer</option>
      <option value="editor" selected>Editor</option>
    </select>

    <div class="sep"></div>

    <button id="btn-apply">Apply</button>
  </div>

  <div class="container" id="mount"></div>

  <div class="info" id="info-box">
    <strong>Mode C</strong> — Multi-app platform with role, branding, user menu, and app switching.
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
