name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: npm install --no-package-lock
      - run: bun run lint

  test:
    name: Test (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: npm install --no-package-lock
      - run: bun run test

  build:
    name: Build (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: npm install --no-package-lock
      - run: bun run build
      - name: Verify dist exists
        run: test -f dist/index.cjs

  generate-check:
    name: Generator Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: opentrackplan/opentp-spec
          path: opentp-spec
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: npm install --no-package-lock
      - name: Validate example plan
        run: bun src/cli.ts validate --root ./opentp-spec/examples/full/
      - name: Generate ts-sdk
        run: bun src/cli.ts generate ts-sdk --root ./opentp-spec/examples/full/ --output /tmp/tracker.ts
      - name: Check generated file is not empty
        run: |
          test -s /tmp/tracker.ts
          grep -q "buildPayload" /tmp/tracker.ts
      - name: TypeCheck generated output
        run: npx tsc --noEmit --strict --moduleResolution node --module es2020 --target es2020 /tmp/tracker.ts || echo "Type check completed"

  ui-typecheck:
    name: TypeCheck (UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - run: cd ui && npx tsc --noEmit

  ui-test:
    name: Test (UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - run: cd ui && npm test

  ui-build:
    name: Build (UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - name: Build SPA
        run: cd ui && npm run build
      - name: Verify dist
        run: test -f ui/dist/index.html
      - name: Build Web Component library
        run: cd ui && BUILD_LIB=1 npm run build
      - name: Verify lib dist
        run: test -f ui/dist/lib/opentp-ui.js
